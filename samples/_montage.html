<!doctype html><html lang="zh"><head><meta charset="utf-8"><style>
*{margin:0;box-sizing:border-box}
body{background:#f5f4ed;font-family:-apple-system,system-ui,"PingFang SC",sans-serif}
.wrap{width:2200px;padding:64px}
.head{display:flex;justify-content:space-between;align-items:baseline;padding:0 8px 40px}
.title{font-family:Georgia,serif;font-weight:500;font-size:64px;color:#141413;letter-spacing:-1px}
.title em{font-style:normal;color:#c96442}
.sub{font-size:26px;color:#87867f;letter-spacing:1px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:36px}
.cell{background:#faf9f5;border-radius:12px;overflow:hidden;box-shadow:0 0 0 1px rgba(0,0,0,.06)}
.cell img{display:block;width:100%}
.cap{padding:20px 22px;display:flex;justify-content:space-between;align-items:baseline}
.cap .id{font-family:ui-monospace,Menlo,monospace;font-size:24px;color:#141413}
.cap .zh{font-size:22px;color:#5e5d59}
</style></head><body>
<div class="wrap">
  <div class="head">
    <div class="title">design-card<em>.</em> 主题总览</div>
    <div class="sub">8 THEMES · 同模板换 :root</div>
  </div>
  <div class="grid">
    <div class="cell"><img src="claude.png"><div class="cap"><span class="id">claude</span><span class="zh">陶土·默认</span></div></div>
    <div class="cell"><img src="newsroom.png"><div class="cap"><span class="id">newsroom</span><span class="zh">报刊</span></div></div>
    <div class="cell"><img src="indigo.png"><div class="cap"><span class="id">indigo</span><span class="zh">靛蓝</span></div></div>
    <div class="cell"><img src="forest.png"><div class="cap"><span class="id">forest</span><span class="zh">森林墨</span></div></div>
    <div class="cell"><img src="kraft.png"><div class="cap"><span class="id">kraft</span><span class="zh">牛皮纸</span></div></div>
    <div class="cell"><img src="dune.png"><div class="cap"><span class="id">dune</span><span class="zh">沙丘</span></div></div>
    <div class="cell"><img src="midnight.png"><div class="cap"><span class="id">midnight</span><span class="zh">午夜·深</span></div></div>
    <div class="cell"><img src="blueprint.png"><div class="cap"><span class="id">blueprint</span><span class="zh">蓝图·深</span></div></div>
  </div>
</div>
</body></html>
